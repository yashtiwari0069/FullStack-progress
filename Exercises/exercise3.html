<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exercise3</title>
    <style>
        .card{
            border: 2px solid black;
            width: 300px;
            height: 450px

        }
        img{
            width: 280px;
            padding-top: 5px;
            border-radius: 20px; 
        }
        .b1{
            display: flex;
            justify-content: center;
        }
        .w1{
            display: inline;
            border: 2px solid black;
            margin-left: 20px;
            margin-right: 20px;
            border-radius: 15px;
            padding: 5px;
        }
        .w2{
            display: inline;
            border: 2px solid black; 
            border-radius: 15px; 
            padding: 5px;
        }
        .capslue{
            margin-top: 10px;
        }
        .topic{
            padding-left: 5px;
        }
        .info{
            padding-left: 5px;
        }
        .footer{
            display: flex;
            justify-content: center;
        }
        .lasttxt{
            color: blue;
            background-color: lightblue;
            padding-left: 20px;
            padding-right: 20px;
            padding-top: 10px;
            padding-bottom: 10px;
            border-radius: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="b1">
        <img src="https://static.vecteezy.com/system/resources/thumbnails/069/780/357/small/sleek-bullet-train-on-tracks-at-a-modern-station-platform-at-sunset-photo.jpeg" alt="white bullet train at station">
        </div>
        <div class="capslue">
            <p class="w1">nature</p>
            <p class="w2">speed</p>
        </div>
        <div>
            <h1 class="topic">N700-Bullet train</h1>
            <p class="info">Lorem, ipsum dolor sit amet consectetur adipisicing elit. Doloremque maiores nulla dolores voluptatum quis delectus vitae similique autem minima earum?</p>
        </div>
        <div class="footer">
            <p class="lasttxt">Read More</p>
        </div>
    </div>
</body>
</html>
