<!-- CSS tranforms -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day18</title>
    <style>
      .container {
        border: 2px solid purple;
        height: 90vh;
      }
      .box {
        background-color: antiquewhite;
        border: 2px solid black;
        width: 50px;
        height: 200px;
        transform: rotate(90deg) scaleX(2) translate(200px, 10px);
        display: flex;
        justify-content: center;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box">box</div>
    </div>
  </body>
</html>

<!-- css transition -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day18</title>
    <style>
      .container {
        background-color: aliceblue;
        width: 70vw;
        height: 50vh;
      }
      .box {
        background-color: antiquewhite;
        width: 7vw;
        height: 5vh;
        transition-property: transform, background-color;
        transition-duration: 2s;
        transition-timing-function: ease-in-out;
        transition-delay: 5s;
      }
      .translate {
        transform: translateX(10vw) translateY(30vh);
        background-color: blue;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="box translate"></div>
    </div>
  </body>
</html>
