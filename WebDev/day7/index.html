<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day7</title>
    <link rel="stylesheet" href="style.css">
    <style>
    
    *{
        margin: 0px;
        padding: 0px;
        /* removing the default values */
    }
     #line1{
        color: rgb(135, 171, 27);
        background-color: yellow;
        padding: 30px;
        margin: 20px;
        border: 2px solid black;
        height: 200px;
        box-sizing: border-box; 
        /* the above line means the height defined by the programmer is border + padding + content = height */
        /* without this height basically means just content height */
     }
    </style>
</head>
<body>
    <p id="line1">i am yash</p>
    <div>
        i love playing games 
    </div>

    <script src="script.js"></script>
</body>
</html>

<!-- every element/tags in html is a box in css -->

<!-- a single element can have multiple class -->

<!-- flow:- 
     content -> padding -> border -> margin

     content is inside the box (html element)
     padding = spacing btw content and box border
     margin = spacing btw  box border and webpage/other element
     'px' should be mention at the end of the value -->

<!-- browser gives a default margin and padding -->

<!-- margin collaspse means when margins overlapping happens and the bigger margin is applied -->
