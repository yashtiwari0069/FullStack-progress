<!-- an list item consits of a marker and content.

     we can change the marker using 'list-style'.

     by default marker is not integrated with the content in order to
     that we use 'list-style-position:inside'.

     we can replace the marker with a img using 'list-style-image'.

     we can also replace the marker with an emoji using
     'list-style-type'.
