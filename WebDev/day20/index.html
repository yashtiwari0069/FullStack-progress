

<!-- object fill and cover -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day20</title>
    <style>
        .container{
            border: 2px solid black;
            background-color: aliceblue;
            width: 80vw;
            height: 60vh;
            background-image: url("https://media.gettyimages.com/id/1228108481/photo/frances-tgv-speeds-to-set-a-new-world-speed-record-for-a-train-on-rails-hitting-574-7.jpg?s=612x612&w=0&k=20&c=bFHt4MgmharwzsrgF8bXnPWJUz8okjPqmplHgUDhOXo=");
            /* adds a background img to the container */
            background-position: bottom center;
            /*  background-position = place the img based on ur liking  */
            /* background-repeat: no-repeat; */
            background-repeat: repeat-x;
            /* background-repeat = when img width or height / both is less than container then the img is repeated when ended */

        }
        img{
            width: 100px;
            height: 150px;
            /* object-fit: cover;
            object-position: bottom center; */
            /* object-fit:contain; */
            /* object-fit: fill; */

        }
        /*object-fit : cover = it covers the dimension given to the image not the container while maintaining the aspect ratio(img quality) */
        /* object-position = allows you to decide which portion of the image u want */
        /*  object-fit:contain = allows the complete image  within the defined dimensions while maintaining aspect ratio(quality)  */
        /* object-fit: fill = takes all the space of the container(expands or compress)  */
    </style>
</head>
<body>
    <div class="container">
        <!-- <img src="https://media.gettyimages.com/id/1228108481/photo/frances-tgv-speeds-to-set-a-new-world-speed-record-for-a-train-on-rails-hitting-574-7.jpg?s=612x612&w=0&k=20&c=bFHt4MgmharwzsrgF8bXnPWJUz8okjPqmplHgUDhOXo=" alt="img of france fastest train tgv"> -->
    </div>
</body>
</html>
