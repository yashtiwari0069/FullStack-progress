<!-- FLEXBOX -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Day16</title>
    <style>
      .container {
        border: 2px solid red;
        display: flex;
        height: 80vh;
        justify-content: space-between center;
        align-items: start;
        flex-direction: row;
        /* flex-wrap: wrap; */
        /* align-content: start; */
        flex-flow: row wrap;
        gap: 10px;
      }
      .item {
        height: 30px;
        width: 30px;
        border: 2px solid black;
        background-color: purple;
        flex-grow: 1;

        /* margin: 4px; */
      }
      .order {
        order: 100;
        flex-grow: 2;
        align-self: end;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="container">
        <div class="item order">
          Lorem, ipsum dolor sit amet consectetur adipisicing elit. Laudantium
          minus a nam perspiciatis delectus repudiandae, totam culpa enim.
          Mollitia, temporibus!
        </div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
      </div>
    </main>
  </body>
</html>


<!-- CSS grid method1 -->


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day16</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: [c1]120px [c2]100px;
            grid-template-rows: [r1]100px [r2]100px [r3]100px;
            border: 2px solid black;
            
        }
        .item{
            background-color: red;
             border: 2px solid black;
             margin: 20px;

        }
        /* .item-4{
            grid-row: 1/2;
            grid-column: 1/2;
        }
        .item-1{
             grid-row: 1/2;
             grid-column: 1/2;
        } */
        .item-5{
          grid-row: r1;
          grid-column: c2;
        }

    </style>
</head>
<body>
    <div class="container">
        <div class="item item-1">1</div>
        <div class="item">2</div>
        <div class="item">3</div>
        <div class="item item-4">4</div>
        <div class="item item-5">5</div>
    </div>
</body>
</html>
