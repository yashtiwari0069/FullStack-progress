<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day2-fullstackjourney</title>
</head>
<body>
    <img   width="200"  src="image.png" alt="pic of e3 shinkansen">
    <img   width="200"  src="image2.png" alt="pic of e5 shinkansen">
    <br>
    <table>
        <caption>Bullet train info</caption>
        <thead>
        <tr>
            <th>Train-Type</th>
            <th>Max-speed</th>
            <th>Price</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>E-3</td>
            <td>275 km/hr</td>
            <td>$100 millon</td>
        </tr>
        </tbody>

        <tfoot>
         <tr>
            <td>E-5</td>
            <td>320 km/hr</td>
            <td>$200 millon</td>
        </tr>
        </tfoot>
    </table>
    <ul type="square">
        <li>Ticket cost</li>
        <li>Time-Table</li>
        <li>Route</li>
    </ul>
    <ol type="A">
        <li>Ticket cost</li>
        <li>Time-Table</li>
        <li>Route</li>
    </ol>
    <h2>Fill this form to book your tickets</h2>
    <form action="post">
        <div>
        <label for="username">Enter your username</label>
        <input type="text" id="username"  name="username" placeholder="Enter your username">
        </div> 
        <div>
            <input type="radio" id=male name="gender" value="male">
            <label for="male">male</label>
            <input type="radio" id=female name="gender" value="female">
            <label for="female">female</label>
        </div>
        <div>
            <input type="checkbox" id="subscribe to this page" name="subscribe or not">
            <label for="subscribe to this page">subscribe to this page</label>
        </div>
        <div>
            <label for="writearea">write here</label>
            <br>
            <textarea id="writearea" rows="10" cols="20" name="txtarea">enter ur exp in bullet train....</textarea>
        </div>
        <div>
            <select name="your fav train">
                <option value="ICE 3">ICE 3</option>
                <option value="TGV">TGV</option>
                <option value="Bullet Train">Bullet Train</option>
            </select>
        </div>
    </form>
</body>
</html>
