
    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Day6</title>
        <style>
            /* element selector */
            p{
                color: yellow;
                background-color: red;
            }

            /* class selector */
            .red{
                background-color: red;
            }

            /* id selector */
            #green{
                background-color: green;
            }

            /* child selector  (use when txt is directly store in div) */
            div > h1{
                color: blueviolet;
                background-color: orange;
            }

            /* descended selector */
            div  p{
                color: blueviolet;
                background-color: orange;
            }

            /* universal selectors */
            *{
                margin: 100;
                padding: 0;
            }

            /* pseudo selector */
            /* when someone visited the link change the colour to purple */
            a:visited{
                color: purple;
            }
            a:hover{
                background-color: gold;
            }
            /* p:first-child  */
            
        </style>
        <link rel="stylesheet" href="style.css">
    </head>
